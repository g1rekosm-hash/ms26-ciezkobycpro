<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciężko Być Pro — Liga Typerów MŚ 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/6.6.6/css/flag-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#FFD700;--gold2:#FFA500;--dark:#07071a;--dark2:#0c0c22;--dark3:#11112a;
  --card:#141428;--card2:#1a1a35;--border:#ffffff10;--text:#e8e8ff;--muted:#6868a0;
  --green:#00e676;--red:#ff5252;--blue:#448aff;--live:#ff2222;
}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,#1a0d3a55 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 80% 80%,#0a1a3a33 0%,transparent 50%);pointer-events:none;z-index:0}

/* HEADER */
header{background:linear-gradient(180deg,#0a0a22 0%,#08081a 100%);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold)44,transparent)}
.logo{display:flex;align-items:center;gap:12px}
.logo-ball{width:36px;height:36px;background:radial-gradient(circle at 35% 35%,#fff 0%,#ddd 40%,#888 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 2px 12px #0008}
.logo-text{font-family:'Oswald',sans-serif;font-size:1.35rem;font-weight:700;letter-spacing:2px;background:linear-gradient(90deg,var(--gold),var(--gold2),#ffec6e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:0.62rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:-2px}
.header-right{display:flex;align-items:center;gap:10px}
.header-badge{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:0.72rem;color:var(--muted)}
.header-badge span{color:var(--green);font-weight:600}
.live-header-dot{width:8px;height:8px;background:var(--live);border-radius:50%;box-shadow:0 0 6px var(--live);animation:blink 1s ease-in-out infinite;display:none}
.live-header-dot.active{display:block}

/* LAYOUT */
.layout{display:grid;grid-template-columns:25% 50% 25%;gap:0;min-height:calc(100vh - 55px);position:relative;z-index:1}

/* CENTER */
.center{padding:20px 28px;border-right:1px solid var(--border);border-left:1px solid var(--border)}
.section-label{font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

/* LAST MATCH */
.last-match{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 4px 24px #00000030}
.match-row{display:flex;align-items:center;justify-content:center;gap:16px}
.match-team{flex:1;text-align:center}
.match-team.home{text-align:right}
.match-team.away{text-align:left}
.team-flag{font-size:2.2rem;display:block;margin-bottom:6px}
.team-name{font-size:0.78rem;color:var(--muted);font-weight:500}
.match-score{background:var(--dark);border:2px solid var(--green);border-radius:10px;padding:8px 18px;text-align:center;min-width:76px;box-shadow:0 0 20px #00e67618}
.score-num{font-family:'Oswald',sans-serif;font-size:1.9rem;font-weight:700;color:var(--green);line-height:1}
.score-label{font-size:0.58rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

/* NEXT MATCH */
.next-match-card{background:linear-gradient(145deg,#16142a,#12102a);border:1px solid #FFD70044;border-radius:14px;padding:20px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden;box-shadow:0 0 40px #FFD70010}
.next-match-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.next-label{font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.next-teams{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:18px}
.next-team{text-align:center}
.next-flag{font-size:3rem;display:block;margin-bottom:8px;border-radius:5px;box-shadow:0 3px 12px #0008}
.next-name{font-size:0.85rem;color:var(--text);font-weight:600}
.vs-badge{font-family:'Oswald',sans-serif;font-size:1.2rem;color:var(--muted)}
.countdown{display:flex;gap:10px;justify-content:center;margin-bottom:8px}
.cd-block{background:var(--dark);border:1px solid var(--border);border-radius:9px;padding:10px 12px;min-width:58px;text-align:center}
.cd-num{font-family:'Oswald',sans-serif;font-size:1.7rem;font-weight:700;color:var(--gold);line-height:1}
.cd-label{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.next-date{font-size:0.73rem;color:var(--muted);margin-top:8px}

/* PRE-MATCH CARD */
.prematch-card{background:linear-gradient(145deg,#0d1a08,#0a1505,#101a08);border:1px solid #88cc2255;border-radius:14px;padding:20px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden;box-shadow:0 0 40px #66bb2215}
.prematch-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#88cc22,transparent);animation:scanline 2s ease-in-out infinite}
.prematch-badge{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(90deg,#4a8800,#66bb22);color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:0.78rem;letter-spacing:3px;padding:5px 16px;border-radius:20px;margin-bottom:14px;box-shadow:0 0 16px #66bb2244}
.prematch-dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:blink 1s ease-in-out infinite}
.prematch-time{font-family:'Oswald',sans-serif;font-size:2.4rem;font-weight:700;color:#88cc22;letter-spacing:4px;margin-bottom:14px;text-shadow:0 0 30px #66bb2233}

/* LIVE CARD */
.live-card{background:linear-gradient(145deg,#1a0808,#110a0a,#140c14);border:1px solid #ff333355;border-radius:14px;padding:20px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden;box-shadow:0 0 50px #ff222220}
.live-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--live),transparent);animation:scanline 2s ease-in-out infinite}
@keyframes scanline{0%,100%{opacity:0.5}50%{opacity:1}}
.live-badge{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(90deg,#cc0000,#ff2222);color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:0.78rem;letter-spacing:3px;padding:5px 16px;border-radius:20px;margin-bottom:16px;box-shadow:0 0 16px #ff222255}
.live-dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.live-teams{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:18px}
.live-score-box{background:#160000;border:2px solid var(--live);border-radius:12px;padding:12px 22px;min-width:90px;box-shadow:0 0 24px #ff222233}
.live-score-num{font-family:'Oswald',sans-serif;font-size:2.6rem;font-weight:700;color:#ff5252;line-height:1;text-shadow:0 0 20px #ff222255}
.live-score-label{font-size:0.6rem;color:#884444;letter-spacing:2px;text-transform:uppercase;margin-top:4px}

/* TVP SPORT LINK */
.tvp-link-card{display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,#001155,#001e88);border:1px solid #0033aa55;border-radius:11px;padding:10px 14px;text-decoration:none;margin-top:14px;transition:all 0.2s;cursor:pointer}
.tvp-link-card:hover{border-color:#4477ff;box-shadow:0 0 20px #0044cc33;transform:translateY(-1px)}
.tvp-logo-box{background:linear-gradient(135deg,#dd0000,#aa0000);color:white;font-family:'Oswald',sans-serif;font-weight:700;font-size:0.75rem;padding:7px 9px;border-radius:7px;letter-spacing:0.5px;line-height:1.2;text-align:center;min-width:38px;flex-shrink:0;box-shadow:0 2px 8px #aa000055}
.tvp-link-text{text-align:left;flex:1}
.tvp-link-text strong{display:block;color:#e8eeff;font-size:0.78rem;font-weight:600;margin-bottom:2px}
.tvp-link-text small{color:#5566aa;font-size:0.66rem}
.tvp-arrow{color:#4477ff;font-size:1.1rem;flex-shrink:0}

/* MATCH SCROLLER */
.scroller-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 4px 20px #00000025}
.scroller-header{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.scroller-title{font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.match-scroll{max-height:280px;overflow-y:auto;scroll-behavior:smooth}
.match-scroll::-webkit-scrollbar{width:3px}
.match-scroll::-webkit-scrollbar-track{background:var(--dark)}
.match-scroll::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
.scroll-item{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border);gap:10px;transition:background 0.15s;cursor:default}
.scroll-item:hover{background:var(--card2)}
.scroll-item.active-match{background:linear-gradient(90deg,#1a1500,var(--card));border-left:3px solid var(--gold)}
.scroll-item.live-match{background:linear-gradient(90deg,#1a0000,var(--card));border-left:3px solid var(--live);animation:live-row-pulse 2s ease-in-out infinite}
@keyframes live-row-pulse{0%,100%{border-left-color:var(--live)}50%{border-left-color:#ff8888}}
.scroll-item.played{opacity:0.45}
.scroll-date-col{font-size:0.68rem;color:var(--muted);min-width:40px;text-align:center;line-height:1.3}
.scroll-teams{flex:1;font-size:0.8rem;font-weight:500}
.scroll-score{font-family:'Oswald',sans-serif;font-size:0.9rem;color:var(--green);min-width:48px;text-align:right}
.scroll-score.upcoming{color:var(--muted);font-size:0.7rem}
.scroll-score.live-score{color:var(--live);font-size:0.9rem;font-weight:700}
.scroll-live-badge{font-size:0.58rem;color:var(--live);font-family:'Oswald',sans-serif;letter-spacing:1px;display:block;line-height:1}
.date-divider{padding:5px 16px;font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);background:var(--dark2);border-bottom:1px solid var(--border)}

/* LEFT — TYPY */
.left-panel{padding:20px 16px 20px 20px;overflow-y:auto;max-height:calc(100vh - 55px);position:relative;z-index:1}
.typy-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:10px;transition:border-color 0.2s;box-shadow:0 2px 12px #00000020}
.typy-card:hover{border-color:#ffffff22}
.typy-match-name{font-size:0.78rem;font-weight:600;margin-bottom:10px;color:var(--text)}
.typy-match-score{font-family:'Oswald',sans-serif;font-size:0.9rem;color:var(--green);float:right}
.typy-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;clear:both}
.typ-row{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;border-radius:5px;background:var(--dark)}
.typ-name{font-size:0.7rem;color:var(--muted)}
.typ-score{font-size:0.76rem;font-weight:600}
.typ-row.exact{background:#1a1400;border:1px solid #FFD70055}
.typ-row.exact .typ-score{color:var(--gold)}
.typ-row.correct{background:#001200;border:1px solid #00e67655}
.typ-row.correct .typ-score{color:var(--green)}
.typ-row.wrong{background:#1a0000;border:1px solid #ff525255}
.typ-row.wrong .typ-score{color:var(--red)}
.typ-row.none .typ-score{color:#333}

/* RIGHT — STANDINGS */
.right-panel{padding:20px 20px 20px 16px;overflow-y:auto;background:var(--dark2);position:relative;z-index:1}
.standings-title{font-family:'Oswald',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--gold);margin-bottom:14px;text-align:center}
.standing-row{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;margin-bottom:5px;background:var(--card);border:1px solid var(--border);transition:all 0.2s}
.standing-row:hover{border-color:#FFD70033;background:var(--card2)}
.standing-row.leader{background:linear-gradient(90deg,#1a1200,var(--card));border-color:#FFD70055;box-shadow:0 0 20px #FFD70010}
.st-rank{font-family:'Oswald',sans-serif;font-size:1rem;color:var(--muted);min-width:22px;text-align:center}
.st-rank.r1{color:var(--gold)}
.st-rank.r2{color:#c0c0c0}
.st-rank.r3{color:#cd7f32}
.st-name{flex:1;font-size:0.78rem;font-weight:600;letter-spacing:0.5px}
.st-pts{font-family:'Oswald',sans-serif;font-size:1.2rem;font-weight:700;color:var(--green)}
.st-exact{min-width:28px;text-align:right;display:flex;align-items:center;gap:3px;justify-content:flex-end}
.pro-badge{display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;font-family:'Oswald',sans-serif;font-size:0.52rem;font-weight:700;letter-spacing:0.5px;border-radius:3px;padding:1px 4px;line-height:1.2}
.st-typed{font-size:0.63rem;color:var(--muted)}
.pts-legend{font-size:0.63rem;color:var(--muted);text-align:center;margin-top:12px;line-height:2}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:0.85rem}

/* GRUPY */
.groups-section{padding:16px 24px 28px;border-top:1px solid var(--border);background:var(--dark2);position:relative;z-index:1}
.groups-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:border-color 0.2s}
.group-card:hover{border-color:#ffffff18}
.group-header{background:var(--dark2);padding:4px 8px;font-family:'Oswald',sans-serif;font-size:0.72rem;color:var(--gold);letter-spacing:1px;border-bottom:1px solid var(--border)}
.group-table{width:100%;border-collapse:collapse;font-size:0.63rem}
.group-table th{padding:3px 4px;color:var(--muted);font-weight:500;text-align:center}
.group-table th:first-child{text-align:left;padding-left:6px}
.group-table td{padding:3px 4px;border-top:1px solid var(--border);text-align:center;color:var(--text)}
.group-table td:first-child{text-align:left;padding-left:6px;display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden}
.group-table tr:hover td{background:var(--card2)}
.g-pts{font-weight:700;color:var(--green)}
.g-flag{font-size:0.75rem;border-radius:2px;flex-shrink:0}
.g-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70px}

/* BIG TIME DISPLAY */
.next-time-big{font-family:'Oswald',sans-serif;font-size:3.8rem;font-weight:700;color:var(--gold);letter-spacing:6px;line-height:1;text-shadow:0 0 40px #FFD70040;margin-bottom:2px}
.next-time-sub{font-size:0.6rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}

/* MATCH DETAILS (stadium, coaches, lineup) */
.match-details-wrap{background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:11px 12px;margin-bottom:12px;text-align:left}
.match-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.match-meta-stadium{font-size:0.7rem;color:var(--text);font-weight:500;display:flex;align-items:center;gap:5px}
.match-meta-stadium small{color:var(--muted);font-size:0.62rem}
.match-lineup{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:start}
.lu-side{text-align:center}
.lu-side.away{text-align:center}
.lu-coach{font-size:0.65rem;color:var(--muted);margin-bottom:2px}
.lu-formation{font-family:'Oswald',sans-serif;font-size:0.9rem;color:var(--gold);font-weight:600;margin-bottom:6px}
.lu-players{display:flex;flex-direction:column;gap:3px}
.lu-row{display:flex;gap:3px;justify-content:center;flex-wrap:wrap}
.lu-p{background:var(--card2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:0.6rem;color:var(--text);white-space:nowrap}
.lu-p.gk{background:#001a00;border-color:#00e67633;color:var(--green)}
.lu-divider{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.7rem;font-weight:600;padding-top:22px}
.lu-noinfo{font-size:0.65rem;color:var(--muted);font-style:italic;text-align:center;padding:8px 0}

/* COUNTDOWN SMALL */
.countdown-small{display:flex;gap:6px;justify-content:center;margin-top:10px}
.cd-s-block{background:var(--dark);border:1px solid var(--border);border-radius:6px;padding:4px 8px;min-width:40px;text-align:center}
.cd-s-num{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;color:var(--muted);line-height:1}
.cd-s-lbl{font-size:0.48rem;color:var(--muted);opacity:0.55;text-transform:uppercase;letter-spacing:1px;margin-top:1px}

/* YOUTUBE HIGHLIGHT LINK */
.yt-link{display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,#0f0000,#1a0000);border:1px solid #ff000030;border-radius:10px;padding:8px 12px;text-decoration:none;margin-top:10px;transition:all 0.2s}
.yt-link:hover{border-color:#ff4444;box-shadow:0 0 15px #ff000022;transform:translateY(-1px)}
.yt-icon{background:#ff0000;border-radius:5px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.yt-text{flex:1;text-align:left}
.yt-text strong{display:block;color:#eeeeff;font-size:0.76rem;font-weight:600}
.yt-text small{color:#664444;font-size:0.64rem}
.yt-arr{color:#ff4444;font-size:0.9rem;flex-shrink:0}

/* PRO BADGE NOWY (jeden z licznikiem) */
.pro-count{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;font-family:'Oswald',sans-serif;font-weight:700;border-radius:5px;padding:3px 8px;text-align:center;line-height:1.2;display:inline-flex;flex-direction:column;align-items:center}
.pro-count-top{font-size:0.7rem;letter-spacing:1px}
.pro-count-bot{font-size:0.55rem;opacity:0.75;letter-spacing:0.5px}

/* STANDINGS ROZBUDOWANE */
.st-bar-wrap{flex:1;display:flex;flex-direction:column;gap:2px}
.st-bar-row{display:flex;align-items:center;gap:6px}
.st-bar{height:3px;border-radius:2px;background:var(--dark);flex:1;overflow:hidden}
.st-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),#00a050);transition:width 0.5s}

/* GRUPY — 4 kolumny zamiast 6 */
.groups-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color 0.2s}
.group-header{background:linear-gradient(90deg,var(--dark2),#14143a);padding:5px 10px;font-family:'Oswald',sans-serif;font-size:0.78rem;color:var(--gold);letter-spacing:2px;border-bottom:1px solid var(--border)}
.group-table{width:100%;border-collapse:collapse;font-size:0.68rem}
.group-table th{padding:4px 5px;color:var(--muted);font-weight:500;text-align:center;font-size:0.6rem}
.group-table th:first-child{text-align:left;padding-left:8px}
.group-table td{padding:4px 5px;border-top:1px solid var(--border);text-align:center;color:var(--text)}
.group-table td:first-child{text-align:left;padding-left:8px;display:flex;align-items:center;gap:5px}
.group-table tr:hover td{background:var(--card2)}
.group-table tr.qualified td{background:linear-gradient(90deg,#001800,transparent)}
.g-pts{font-weight:700;color:var(--green);font-family:'Oswald',sans-serif;font-size:0.78rem}
.g-flag{font-size:0.85rem;border-radius:2px;flex-shrink:0}
.g-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;font-weight:500}

/* MOBILE */
@media(max-width:900px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto}
  .left-panel{order:3;border-top:1px solid var(--border);max-height:none}
  .center{order:1;border:none}
  .right-panel{order:2;border-top:1px solid var(--border);background:var(--dark)}
  .groups-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:600px){
  .countdown{gap:6px}
  .cd-block{min-width:46px;padding:8px 8px}
  .cd-num{font-size:1.4rem}
  .next-flag,.live-flag{font-size:2rem!important}
  .logo-text{font-size:1rem}
  .groups-grid{grid-template-columns:repeat(2,1fr)}
}

// Normalizacja nazwy drużyny do klucza (usuwa polskie znaki, spacje, interpunkcję)
function normT(n){
  return n.toLowerCase()
    .replace(/ą/g,'a').replace(/ć/g,'c').replace(/ę/g,'e').replace(/ł/g,'l')
    .replace(/ń/g,'n').replace(/ó/g,'o').replace(/ś/g,'s').replace(/ź/g,'z').replace(/ż/g,'z')
    .replace(/[^a-z]/g,'');
}
// Klucz meczu niezależny od kolejności drużyn (sortowany)
function mkey(a,b){ const na=normT(a),nb=normT(b); return na<nb?na+'|'+nb:nb+'|'+na; }

function formatDt(dt){
  return String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
}

function getFlag(name, size='1.4rem'){
  const code = FLAGS[name.trim()];
  if(!code) return `<span style="font-size:${size}">🏳️</span>`;
  return `<span class="fi fi-${code}" style="font-size:${size};border-radius:3px;box-shadow:0 1px 4px #0008;flex-shrink:0"></span>`;
}

function parseScore(s){
  if(!s||s==='-'||s.trim()==='') return null;
  const p = s.trim().split(':');
  if(p.length!==2) return null;
  const a = parseInt(p[0]), b = parseInt(p[1]);
  if(isNaN(a)||isNaN(b)) return null;
  return [a,b];
}

function getOutcome(h,a){ return h>a?'H':a>h?'A':'D'; }

function calcPts(pred,rh,ra){
  if(!pred) return 0;
  if(pred[0]===rh&&pred[1]===ra) return 3;
  if(getOutcome(pred[0],pred[1])===getOutcome(rh,ra)) return 1;
  return 0;
}

function predClass(pred,rh,ra){
  if(!pred) return 'none';
  const p = calcPts(pred,rh,ra);
  return p===3?'exact':p===1?'correct':'wrong';
}

function getMatchDateTime(dateStr, timeStr){
  const months={'stycznia':0,'lutego':1,'marca':2,'kwietnia':3,'maja':4,'czerwca':5,'lipca':6,'sierpnia':7,'września':8,'października':9,'listopada':10,'grudnia':11};
  const parts = dateStr.trim().split(' ');
  const day = parseInt(parts[0]);
  const month = months[parts[1]];
  const [h,m] = timeStr.split(':').map(Number);
  return new Date(2026,month,day,h,m,0);
}

function parseCSV(text){
  const rows = [];
  const lines = text.split('\n');
  for(const line of lines){
    const cols = [];
    let inQ = false, cur = '';
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){ inQ=!inQ; }
      else if(line[i]===','&&!inQ){ cols.push(cur.trim()); cur=''; }
      else cur+=line[i];
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

function processData(rows){
  const matches = [];
  let currentDate = '';
  let dateMatchIdx = {};

  for(let i=1;i<rows.length;i++){
    const r = rows[i];
    if(!r||r.length<2) continue;
    const col0 = r[0]?r[0].replace(/"/g,'').trim():'';
    const col1 = r[1]?r[1].replace(/"/g,'').trim():'';

    if(!col0&&col1&&col1.includes('czerwca')){
      currentDate = col1;
      dateMatchIdx[currentDate] = 0;
      continue;
    }
    if(!col0||!col1) continue;
    if(col1==='SUMA'||col1==='MECZ') continue;

    const parts = col1.split(/\s*-\s*/);
    if(parts.length<2) continue;

    const sheetScore = parseScore(r[14]?r[14].replace(/"/g,''):'');
    const preds = {};
    PLAYERS.forEach((p,idx)=>{
      const raw = r[idx+2]?r[idx+2].replace(/"/g,'').trim():'';
      preds[p] = parseScore(raw);
    });

    const home = parts[0].trim();
    const away = parts.slice(1).join(' - ').trim();
    const dt = getScheduledDt(home, away);
    const time = formatDt(dt);
    // Wynik z Google Sheets ma priorytet; jeśli brak, użyj ESPN cache (dla zakończonych meczów)
    const finished = dt < new Date(Date.now() - LIVE_DURATION_MS);
    let real = sheetScore;
    if(!real && finished){
      const espn = ESPN_SCORES[mkey(home,away)];
      if(espn){
        // Sprawdź czy kolejność home/away zgadza się z ESPN; jeśli nie — zamień
        const sameOrder = normT(home) === normT(espn.h);
        real = sameOrder ? espn.s : [espn.s[1], espn.s[0]];
      }
    }

    matches.push({
      date:currentDate, group:col0,
      home, away,
      real, preds, time, dt
    });
  }
  return matches;
}

// Dodatkowe aliasy ESPN (różne pisownie)

// Cache wyników zakończonych meczów pobranych z ESPN (wypełnia braki z Google Sheets)
const ESPN_SCORES = {};

async function fetchESPNScoresByDate(dateStr){ // dateStr = 'YYYYMMDD'
  try{
    const r = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/FIFA.WORLD/scoreboard?dates=${dateStr}`);
    if(!r.ok) return;
    const data = await r.json();
    (data.events||[]).forEach(e=>{
      const comp = e.competitions?.[0];
      if(!comp) return;
      const st = comp.status?.type;
      const isCompleted = st?.completed === true || st?.state === 'post' || st?.name === 'STATUS_FINAL';
      if(!isCompleted) return; // tylko zakończone
      const competitors = comp.competitors||[];
      const homeC = competitors.find(c=>c.homeAway==='home');
      const awayC = competitors.find(c=>c.homeAway==='away');
      if(!homeC||!awayC) return;
      const hEn = (homeC.team?.displayName||'').toLowerCase();
      const aEn = (awayC.team?.displayName||'').toLowerCase();
      const hPl = ESPN_NAMES_REV[hEn] || Object.keys(ESPN_NAMES).find(p=>ESPN_NAMES[p].toLowerCase().includes(hEn.split(' ')[0])) || hEn;
      const aPl = ESPN_NAMES_REV[aEn] || Object.keys(ESPN_NAMES).find(p=>ESPN_NAMES[p].toLowerCase().includes(aEn.split(' ')[0])) || aEn;
      const k = mkey(hPl, aPl);
      if(!ESPN_SCORES[k]){
        // Przechowujemy też nazwy drużyn żeby potem poprawnie przypisać wynik home/away
        ESPN_SCORES[k] = { h: hPl, a: aPl, s: [parseInt(homeC.score||0), parseInt(awayC.score||0)] };
      }
    });
  }catch(e){}
}

function toESPNDate(dt){
  return `${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}`;
}

async function fetchAllCompletedScores(){
  const now = new Date();
  const dates = new Set();
  Object.values(MATCH_SCHEDULE).forEach(dt=>{
    if(dt < now){
      dates.add(toESPNDate(dt));
      // Mecze nocne (0–9 CEST) to wieczór poprzedniego dnia w USA — dodaj też poprzedni dzień
      if(dt.getHours() < 10){
        const prev = new Date(dt.getTime() - 86400000);
        dates.add(toESPNDate(prev));
      }
    }
  });
  if(dates.size) await Promise.all([...dates].map(d=>fetchESPNScoresByDate(d)));
}

async function fetchLiveScoreESPN(home, away){
  try{
    const r = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/FIFA.WORLD/scoreboard');
    if(!r.ok) return null;
    const data = await r.json();
    const eh = ESPN_NAMES[home]||home, ea = ESPN_NAMES[away]||away;
    const event = (data.events||[]).find(e=>{
      const names = (e.competitions?.[0]?.competitors||[]).map(c=>c.team?.displayName||'');
      return names.some(n=>n.toLowerCase().includes(eh.toLowerCase().split(' ')[0]))
          && names.some(n=>n.toLowerCase().includes(ea.toLowerCase().split(' ')[0]));
    });
    if(!event) return null;
    const comps = event.competitions?.[0]?.competitors||[];
    const hc = comps.find(c=>(c.team?.displayName||'').toLowerCase().includes(eh.toLowerCase().split(' ')[0]));
    const ac = comps.find(c=>(c.team?.displayName||'').toLowerCase().includes(ea.toLowerCase().split(' ')[0]));
    if(!hc||!ac) return null;
    return [parseInt(hc.score||0), parseInt(ac.score||0)];
  }catch(e){ return null; }
}

      <div class="live-score-box">
        <div class="live-score-num">${score}</div>
        <div class="live-score-label">LIVE</div>
      </div>
      <div class="next-team">
        <span style="font-size:3rem;display:block;margin-bottom:8px">${getFlag(match.away,'3rem')}</span>
        <span class="next-name">${match.away}</span>
      </div>
    </div>
    ${tvpLinkHtml(tvpUrl)}
  </div>`;
  document.getElementById('live-header-dot').classList.add('active');
  // Pobierz wynik live z ESPN (async, podmienia po załadowaniu)
  fetchLiveScoreESPN(match.home, match.away).then(apiScore=>{
    if(!apiScore) return;
    const el = document.querySelector('.live-score-num');
    if(el) el.textContent = `${apiScore[0]}:${apiScore[1]}`;
  });
}

function buildLineupHtml(players, formation){
  if(!players||!players.length) return '<div class="lu-noinfo">Skład nieznany</div>';
  const sections = [1,...formation.split('-').map(Number)];
  const rows = [];
  let idx = 0;
  for(const cnt of sections){ rows.push(players.slice(idx,idx+cnt)); idx+=cnt; }
  return rows.reverse().map((row,ri)=>
    `<div class="lu-row">${row.map(p=>`<span class="lu-p${ri===rows.length-1?' gk':''}">${p}</span>`).join('')}</div>`
  ).join('');
}

function buildMatchDetailsHtml(home, away){
  const info = MATCH_INFO[mkey(home,away)];
  if(!info) return '';
  const hL = buildLineupHtml(info.homePlayers, info.homeForm||'4-3-3');
  const aL = buildLineupHtml(info.awayPlayers, info.awayForm||'4-3-3');
  return `
  <div class="match-details-wrap">
    <div class="match-meta">
      <div class="match-meta-stadium">🏟 <div><span>${info.stadium}</span></div></div>
    </div>
    <div class="match-lineup">
      <div class="lu-side">
        <div class="lu-coach">🧑‍💼 ${info.homeCoach}</div>
        <div class="lu-formation">${info.homeForm||'—'}</div>
        <div class="lu-players">${hL}</div>
      </div>
      <div class="lu-divider">VS</div>
      <div class="lu-side away">
        <div class="lu-coach">🧑‍💼 ${info.awayCoach}</div>
        <div class="lu-formation">${info.awayForm||'—'}</div>
        <div class="lu-players">${aL}</div>
      </div>
    </div>
  </div>`;
}

function renderNextMatch(matches){
  const now = new Date();
  const liveMatch = matches.find(m => isLive(m));
  if(liveMatch){
    renderLiveMatch(liveMatch);
    if(countdownInterval){ clearInterval(countdownInterval); countdownInterval=null; }
    return;
  }

  document.getElementById('live-header-dot').classList.remove('active');

  const upcoming = matches.filter(m=>!m.real&&m.dt>now);
  if(!upcoming.length){
    document.getElementById('next-match-container').innerHTML='';
    return;
  }
  const next = upcoming[0];
  const msTillNext = next.dt - now;
  const days = ['niedziela','poniedziałek','wtorek','środa','czwartek','piątek','sobota'];
  const dateLabel = `${days[next.dt.getDay()]}, ${next.date} · Gr. ${next.group}`;
  const tvpUrl = TVP_LINKS[mkey(next.home,next.away)] || 'https://sport.tvp.pl';

  // PRE-MATCH: 15 minut przed meczem
  if(msTillNext <= 15 * 60 * 1000){
    document.getElementById('next-match-container').innerHTML=`
    <div class="prematch-card">
      <div><span class="prematch-badge"><span class="prematch-dot"></span> ZARAZ MECZ</span></div>
      <div class="prematch-time">DZIŚ ${next.time}</div>
      <div class="live-teams" style="margin-bottom:14px">
        <div class="next-team">
          <span style="font-size:3rem;display:block;margin-bottom:8px">${getFlag(next.home,'3rem')}</span>
          <span class="next-name">${next.home}</span>
        </div>
        <div style="font-family:'Oswald',sans-serif;font-size:1.4rem;color:var(--muted);padding-top:16px">VS</div>
        <div class="next-team">
          <span style="font-size:3rem;display:block;margin-bottom:8px">${getFlag(next.away,'3rem')}</span>
          <span class="next-name">${next.away}</span>
        </div>
      </div>
      ${tvpLinkHtml(tvpUrl)}
    </div>`;
    if(countdownInterval) clearInterval(countdownInterval);
    return;
  }

  // Normalny widok: countdown
  const detailsHtml = buildMatchDetailsHtml(next.home, next.away);
  document.getElementById('next-match-container').innerHTML=`
  <div class="next-match-card">
    <div class="next-label">Następny mecz</div>
    <div class="next-time-big">${next.time}</div>
    <div class="next-time-sub">CEST · ${dateLabel}</div>
    <div class="next-teams">
      <div class="next-team">
        <span class="next-flag">${getFlag(next.home,'2.8rem')}</span>
        <span class="next-name">${next.home}</span>
      </div>
      <span class="vs-badge">VS</span>
      <div class="next-team">
        <span class="next-flag">${getFlag(next.away,'2.8rem')}</span>
        <span class="next-name">${next.away}</span>
      </div>
    </div>
    ${detailsHtml}
    <div class="countdown-small">
      <div class="cd-s-block"><div class="cd-s-num" id="cd-d">—</div><div class="cd-s-lbl">dni</div></div>
      <div class="cd-s-block"><div class="cd-s-num" id="cd-h">—</div><div class="cd-s-lbl">godz</div></div>
      <div class="cd-s-block"><div class="cd-s-num" id="cd-m">—</div><div class="cd-s-lbl">min</div></div>
      <div class="cd-s-block"><div class="cd-s-num" id="cd-s">—</div><div class="cd-s-lbl">sek</div></div>
    </div>
    ${tvpUrl !== 'https://sport.tvp.pl' ? tvpLinkHtml(tvpUrl) : ''}
  </div>`;

  function tick(){
    const diff = next.dt - new Date();
    if(diff<=0){ clearInterval(countdownInterval); return; }
    const dd=Math.floor(diff/86400000), hh=Math.floor((diff%86400000)/3600000),
          mm=Math.floor((diff%3600000)/60000), ss=Math.floor((diff%60000)/1000);
    const el = document.getElementById('cd-d');
    if(!el) return;
    el.textContent=String(dd).padStart(2,'0');
    document.getElementById('cd-h').textContent=String(hh).padStart(2,'0');
    document.getElementById('cd-m').textContent=String(mm).padStart(2,'0');
    document.getElementById('cd-s').textContent=String(ss).padStart(2,'0');
  }
  tick();
  if(countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(tick,1000);
}

function renderScroller(matches){
  const scroll = document.getElementById('match-scroll');
  scroll.innerHTML = '';
  let lastDate = '';
  let nextIdx = -1;
  const now = new Date();
  matches.forEach((m,i)=>{
    if(!m.real&&m.dt>now&&nextIdx===-1) nextIdx=i;
  });
  document.getElementById('scroll-info').textContent=`${matches.filter(m=>m.real).length}/${matches.length} rozegrane`;

  matches.forEach((m,i)=>{
    if(m.date!==lastDate){
      scroll.innerHTML+=`<div class="date-divider">${m.date}</div>`;
      lastDate=m.date;
    }
    const live = isLive(m);
    const played = !!m.real;
    const isNext = i===nextIdx && !live;

    let scoreHtml;
    if(live){
      const s = m.real ? `${m.real[0]}:${m.real[1]}` : '- : -';
      scoreHtml=`<div style="text-align:right;min-width:48px"><span class="scroll-score live-score">${s}</span><span class="scroll-live-badge">LIVE</span></div>`;
    } else if(played){
      scoreHtml=`<span class="scroll-score">${m.real[0]}:${m.real[1]}</span>`;
    } else {
      scoreHtml=`<span class="scroll-score upcoming">${m.time}</span>`;
    }

    scroll.innerHTML+=`
    <div class="scroll-item ${live?'live-match':''} ${isNext?'active-match':''} ${played&&!live?'played':''}">
      <div class="scroll-date-col">${m.group}</div>
      <div class="scroll-teams" style="display:flex;align-items:center;gap:5px">${getFlag(m.home,'1rem')} ${m.home} — ${m.away} ${getFlag(m.away,'1rem')}</div>
      ${scoreHtml}
    </div>`;
  });

  // Przewiń do live meczu lub następnego
  const liveIdx = matches.findIndex(m => isLive(m));
  const scrollTo = liveIdx >= 0 ? liveIdx : nextIdx;
  if(scrollTo >= 0){
    setTimeout(()=>{
      const items = scroll.querySelectorAll('.scroll-item');
      if(items[scrollTo]) items[scrollTo].scrollIntoView({block:'center',behavior:'smooth'});
    },300);
  }
}

function renderTypy(matches){
  const played = matches.filter(m=>m.real).slice().reverse();
  const cont = document.getElementById('typy-container');
  cont.innerHTML = '';
  played.forEach(m=>{
    const predsHtml = PLAYERS.map(p=>{
      const pred = m.preds[p];
      const cls = predClass(pred,m.real[0],m.real[1]);
      const pts = calcPts(pred,m.real[0],m.real[1]);
      const ptsStr = pred?(pts>0?`+${pts}`:'✗'):'—';
      return`<div class="typ-row ${cls}">
        <span class="typ-name">${p}</span>
        <span class="typ-score">${pred?pred[0]+':'+pred[1]:'—'} <small style="opacity:0.55">${ptsStr}</small></span>
      </div>`;
    }).join('');
    cont.innerHTML+=`
    <div class="typy-card">
      <div class="typy-match-name" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        ${getFlag(m.home,'1.1rem')} ${m.home} <span class="typy-match-score">${m.real[0]}:${m.real[1]}</span> ${m.away} ${getFlag(m.away,'1.1rem')}
      </div>
      <div class="typy-grid">${predsHtml}</div>
    </div>`;
  });
}

function renderGroups(matches){
  const groups = {};
  // Inicjalizuj wszystkie 12 grup z kompletem drużyn
  Object.entries(GROUPS).forEach(([g,teams])=>{
    groups[g]={};
    teams.forEach(t=>{ groups[g][t]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  });
  // Rozwiąż nazwę drużyny do klucza w grupie — zwraca null jeśli nie znaleziono
  function resolveTeam(g, name){
    const n = normT(name);
    const found = Object.keys(groups[g]||{}).find(k=>normT(k)===n);
    if(found) return found;
    const canonical = TEAM_ALIASES[n];
    if(canonical){
      const found2 = Object.keys(groups[g]||{}).find(k=>k===canonical);
      if(found2) return found2;
    }
    return null; // Nieznana drużyna — nie dodawaj do tabeli
  }

  matches.forEach(m=>{
    const g = m.group;
    if(!g||g.length>1) return;
    if(!groups[g]) groups[g]={};
    const home = resolveTeam(g, m.home);
    const away = resolveTeam(g, m.away);
    if(!home||!away) return; // Pomiń jeśli drużyna nie jest w tej grupie
    if(m.real){
      const[hg,ag]=m.real;
      groups[g][home].p++;groups[g][away].p++;
      groups[g][home].gf+=hg;groups[g][home].ga+=ag;
      groups[g][away].gf+=ag;groups[g][away].ga+=hg;
      if(hg>ag){groups[g][home].w++;groups[g][home].pts+=3;groups[g][away].l++;}
      else if(ag>hg){groups[g][away].w++;groups[g][away].pts+=3;groups[g][home].l++;}
      else{groups[g][home].d++;groups[g][home].pts+=1;groups[g][away].d++;groups[g][away].pts+=1;}
    }
  });

  const grid = document.getElementById('groups-grid');
  grid.innerHTML = '';
  Object.keys(groups).sort().forEach(g=>{
    const teams = Object.entries(groups[g])
      .sort((a,b)=>b[1].pts-a[1].pts||(b[1].gf-b[1].ga)-(a[1].gf-a[1].ga));
    grid.innerHTML+=`
    <div class="group-card">
      <div class="group-header">GRUPA ${g}</div>
      <table class="group-table">
        <thead><tr><th>Drużyna</th><th>M</th><th>W</th><th>R</th><th>P</th><th>Pkt</th></tr></thead>
        <tbody>${teams.map(([name,s])=>`
          <tr>
            <td><span class="g-flag">${getFlag(name,'0.85rem')}</span><span class="g-name">${name}</span></td>
            <td>${s.p}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
            <td class="g-pts">${s.pts}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  });
}

function renderAll(matches){
  renderStandings(matches);
  renderLastMatch(matches);
  renderNextMatch(matches);
  renderScroller(matches);
  renderTypy(matches);
  renderGroups(matches);
}

async function init(){
  try{
    const [rows] = await Promise.all([fetchData(), fetchAllCompletedScores()]);
    const matches = processData(rows);
    renderAll(matches);
    // Auto-discovery skrótów YouTube — jeśli znajdzie nowe, odśwież sekcję ostatniego meczu
    autoDiscoverHighlights().then(found=>{ if(found) renderLastMatch(matches); });
  }catch(e){
    console.error(e);
    document.getElementById('standings-container').innerHTML='<div class="loading">Błąd ładowania danych</div>';
  }
}

init();
setInterval(init,60000);
</script>
